<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Anime Gallery - Final Exam March 2026</title>
        <meta name="robots" content="noindex" />

        <!-- Bootstrap 5.3 CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <!-- Bootstrap Icons -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
        />
        <!-- Bootstrap 5.3 JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body class="bg-light">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="bi bi-images"></i> Anime Gallery
                </a>
                <button
                    class="btn btn-outline-light position-relative"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#favoritesOffcanvas"
                >
                    <i class="bi bi-heart-fill"></i> Favorites
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                        id="favoritesBadge"
                    >
                        0
                    </span>
                </button>
            </div>
        </nav>

        <!-- Main Container -->
        <div class="container my-5">
            <!-- Carousel -->
            <div
                id="animeCarousel"
                class="carousel slide mb-5"
                data-bs-ride="carousel"
            >
                <div class="carousel-indicators">
                    <button
                        type="button"
                        data-bs-target="#animeCarousel"
                        data-bs-slide-to="0"
                        class="active"
                    ></button>
                </div>
                <div class="carousel-inner rounded">
                    <div class="carousel-item active">
                        <img
                            src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1200&h=400&fit=crop"
                            class="d-block w-100 object-fit-cover"
                            style="height: 400px"
                            alt="Anime"
                        />
                        <div
                            class="carousel-caption d-none d-md-block bg-dark bg-opacity-75 rounded p-3"
                        >
                            <h5>Anime Title</h5>
                            <p>Anime description goes here.</p>
                        </div>
                    </div>
                </div>
                <button
                    class="carousel-control-prev"
                    type="button"
                    data-bs-target="#animeCarousel"
                    data-bs-slide="prev"
                >
                    <span class="carousel-control-prev-icon"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button
                    class="carousel-control-next"
                    type="button"
                    data-bs-target="#animeCarousel"
                    data-bs-slide="next"
                >
                    <span class="carousel-control-next-icon"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>

            <!-- Anime Grid -->
            <div class="row" id="animeGrid">
                <!-- Example: Single dummy card for students to see the structure -->
                <div class="col-md-4 col-sm-6 mb-4">
                    <div class="card h-100">
                        <img
                            src="https://placehold.co/600x400"
                            class="card-img-top object-fit-cover"
                            style="height: 250px"
                            alt="Anime Title"
                        />
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">Anime Title</h5>
                            <p class="card-text text-muted small">Genre</p>
                            <p class="card-text flex-grow-1">Description</p>
                            <p class="card-text small">
                                <strong>Year:</strong> 2024 |
                                <strong>Episodes:</strong> 12
                            </p>
                            <div class="d-flex gap-2">
                                <button
                                    class="btn btn-primary flex-grow-1"
                                    data-bs-toggle="modal"
                                    data-bs-target="#animeModal"
                                >
                                    View Details
                                </button>
                                <button class="btn btn-outline-danger">
                                    <i class="bi bi-heart"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Anime Details Modal -->
        <div class="modal fade" id="animeModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalAnimeTitle"></h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-5">
                                <img
                                    id="modalAnimeImage"
                                    src=""
                                    alt="Anime Image"
                                    class="img-fluid rounded"
                                />
                            </div>
                            <div class="col-md-7">
                                <p>
                                    <strong>Description:</strong>
                                    <span id="modalAnimeDescription"></span>
                                </p>
                                <p>
                                    <strong>Genre:</strong>
                                    <span id="modalAnimeGenre"></span>
                                </p>
                                <p>
                                    <strong>Year:</strong>
                                    <span id="modalAnimeYear"></span>
                                </p>
                                <p>
                                    <strong>Episodes:</strong>
                                    <span id="modalAnimeEpisodes"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Close
                        </button>
                        <button
                            type="button"
                            class="btn btn-danger"
                            id="favoriteButton"
                        >
                            <i class="bi bi-heart"></i> Add to Favorites
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Favorites Offcanvas -->
        <div
            class="offcanvas offcanvas-end"
            tabindex="-1"
            id="favoritesOffcanvas"
        >
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">
                    <i class="bi bi-heart-fill"></i> My Favorites
                </h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="offcanvas"
                ></button>
            </div>
            <div class="offcanvas-body">
                <div id="favoritesList">
                    <p class="text-muted">No favorites yet</p>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
            <div id="favoriteToast" class="toast" role="alert">
                <div class="toast-header bg-success text-white">
                    <i class="bi bi-check-circle me-2"></i>
                    <strong class="me-auto">Success</strong>
                    <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="toast"
                    ></button>
                </div>
                <div class="toast-body" id="toastMessage">
                    Added to favorites!
                </div>
            </div>
        </div>
    </body>
</html>
