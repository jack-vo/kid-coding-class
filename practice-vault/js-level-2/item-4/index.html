<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JS Level 2 - Exercise 4: Array.filter</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-9 col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h2 class="card-title mb-3">
                                Find Passed Students with Array.filter
                            </h2>
                            <p class="mb-4">
                                Click the button to filter students who passed
                                (score 60 or above) and render them in a
                                Bootstrap table.
                            </p>

                            <button
                                class="btn btn-success mb-3"
                                onclick="showPassedStudents()"
                            >
                                Show Passed Students
                            </button>

                            <div id="result"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const students = [
                { name: 'Lina', score: 95 },
                { name: 'Tom', score: 48 },
                { name: 'Sokha', score: 82 },
                { name: 'Nita', score: 59 },
                { name: 'Dara', score: 74 },
            ];

            function showPassedStudents() {
                const result = document.getElementById('result');

                // filter returns only items that match the condition.
                const passedStudents = students.filter(
                    (student) => student.score >= 60,
                );

                if (passedStudents.length === 0) {
                    result.innerHTML =
                        '<div class="alert alert-warning mb-0">No passed students found.</div>';
                    return;
                }

                const rows = passedStudents
                    .map((student, index) => {
                        return `
							<tr>
								<td>${index + 1}</td>
								<td>${student.name}</td>
								<td>${student.score}</td>
							</tr>
						`;
                    })
                    .join('');

                result.innerHTML = `
					<div class="table-responsive">
						<table class="table table-striped table-bordered align-middle mb-0">
							<thead class="table-light">
								<tr>
									<th>#</th>
									<th>Name</th>
									<th>Score</th>
								</tr>
							</thead>
							<tbody>
								${rows}
							</tbody>
						</table>
					</div>
				`;
            }
        </script>
    </body>
</html>
