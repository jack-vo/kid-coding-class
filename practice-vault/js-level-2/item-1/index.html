<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JS Level 2 - Exercise 1</title>
        <!-- Bootstrap 5.4 CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h2 class="card-title mb-3">Double and Add</h2>
                            <p class="mb-4">
                                Enter a number and click the button to see
                                <b>(number × 2) + bonus</b>.
                            </p>
                            <form
                                class="row g-3 align-items-center"
                                onsubmit="event.preventDefault(); handleClick();"
                            >
                                <div class="col-auto">
                                    <label for="num" class="col-form-label"
                                        >Number:</label
                                    >
                                </div>
                                <div class="col-auto">
                                    <input
                                        type="number"
                                        class="form-control"
                                        id="num"
                                        value="5"
                                    />
                                </div>
                                <div class="col-auto">
                                    <button
                                        type="submit"
                                        class="btn btn-primary"
                                    >
                                        Calculate
                                    </button>
                                </div>
                            </form>
                            <div class="result mt-4 fw-bold" id="result"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Use const for variables that are not reassigned
            // Use arrow function and default argument value
            const doubleAndAdd = (n, bonus = 10) => n * 2 + bonus;

            function handleClick() {
                const numInput = document.getElementById('num');
                const resultDiv = document.getElementById('result');
                const value = Number(numInput.value);
                // Call the arrow function with default argument
                const result = doubleAndAdd(value);
                resultDiv.textContent = `Result: ${result}`;
            }
        </script>
    </body>
</html>
