<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JS Level 2 - Exercise 3: Array.map</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-7">
                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <h2 class="card-title mb-3">
                                Student Scoreboard with Array.map
                            </h2>
                            <p class="mb-4">
                                Click the button to transform student objects
                                into richer objects with <code>grade</code>,
                                <code>passed</code>, and <code>badge</code>.
                            </p>

                            <button
                                class="btn btn-primary mb-3"
                                onclick="renderScoreboard()"
                            >
                                Build Scoreboard
                            </button>

                            <div id="result"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const students = [
                { name: 'Lina', score: 95 },
                { name: 'Tom', score: 68 },
                { name: 'Sokha', score: 82 },
                { name: 'Nita', score: 74 },
                { name: 'Dara', score: 59 },
            ];

            const getGrade = (score) => {
                if (score >= 90) return 'A';
                if (score >= 80) return 'B';
                if (score >= 70) return 'C';
                if (score >= 60) return 'D';
                return 'F';
            };

            function renderScoreboard() {
                const result = document.getElementById('result');

                // map creates a new array with extra computed fields.
                const transformedStudents = students.map((student) => {
                    const grade = getGrade(student.score);
                    const passed = student.score >= 60;

                    return {
                        ...student,
                        grade,
                        passed,
                        badge: passed ? 'Great Job' : 'Keep Going',
                    };
                });

                const tableRows = transformedStudents
                    .map((student, index) => {
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${student.name}</td>
                                <td>${student.score}</td>
                                <td>${student.grade}</td>
                                <td>${student.passed ? 'Yes' : 'No'}</td>
                                <td>${student.badge}</td>
                            </tr>
                        `;
                    })
                    .join('');

                result.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Score</th>
                                    <th>Grade</th>
                                    <th>Passed</th>
                                    <th>Badge</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        </script>
    </body>
</html>
