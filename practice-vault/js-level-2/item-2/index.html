<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JS Level 2 - Exercise 2: Array.forEach</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body class="bg-light">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-7 col-lg-6">
				<div class="card shadow-sm">
					<div class="card-body">
						<h2 class="card-title mb-3">Favorite Fruits List</h2>
						<p class="mb-4">Click the button to show a list of favorite fruits using <code>Array.forEach</code>.</p>
						<button class="btn btn-success mb-3" onclick="renderFruits()">Show Fruits</button>
						<ul class="list-group" id="fruits-list"></ul>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		// Array of favorite fruits
		const fruits = ["Apple", "Banana", "Mango", "Orange", "Strawberry"];

		function renderFruits() {
			const list = document.getElementById('fruits-list');
			list.innerHTML = '';
			// Use forEach to render each fruit as a list item
			fruits.forEach(fruit => {
				const li = document.createElement('li');
				li.className = 'list-group-item';
				li.textContent = fruit;
				list.appendChild(li);
			});
		}
	</script>
</body>
</html>
