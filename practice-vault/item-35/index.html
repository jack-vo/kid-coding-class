<!doctype html>
<html>
    <head>
        <title>Get to know Bootstrap</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"
        ></script>
    </head>
    <body>
        <!-- Navbar -->
        <nav class="navbar navbar-dark bg-primary">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">
                    <i class="bi bi-shop"></i> Product Store
                </span>
                <button
                    class="btn btn-light position-relative"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#cartOffcanvas"
                >
                    <i class="bi bi-cart3"></i> Cart
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                        id="cartBadge"
                    >
                        0
                    </span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container my-5">
            <h1 class="text-center mb-4">Our Products</h1>
            <div class="row g-4" id="productsGrid">
                <!-- Products will be rendered here by JavaScript -->
            </div>
        </div>

        <!-- Product Details Modal -->
        <div class="modal fade" id="productModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalProductName"></h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-5">
                                <img
                                    id="modalProductImage"
                                    src=""
                                    alt="Product Image"
                                    class="img-fluid rounded"
                                />
                            </div>
                            <div class="col-md-7">
                                <p>
                                    <strong>Description:</strong>
                                    <span id="modalProductDescription"></span>
                                </p>
                                <p>
                                    <strong>Price:</strong> $<span
                                        id="modalProductPrice"
                                    ></span>
                                </p>
                                <p>
                                    <strong>Category:</strong>
                                    <span id="modalProductCategory"></span>
                                </p>
                                <p>
                                    <strong>Available Stock:</strong>
                                    <span id="modalProductStock"></span>
                                </p>

                                <div
                                    class="d-flex align-items-center gap-3 mt-4"
                                >
                                    <label class="fw-bold">Quantity:</label>
                                    <div class="btn-group" role="group">
                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary"
                                            onclick="decreaseQuantity()"
                                        >
                                            -
                                        </button>
                                        <input
                                            type="text"
                                            class="form-control text-center"
                                            id="quantityInput"
                                            value="1"
                                            readonly
                                        />
                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary"
                                            onclick="increaseQuantity()"
                                        >
                                            +
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Close
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            data-bs-dismiss="modal"
                            onclick="addToCart()"
                        >
                            <i class="bi bi-cart-plus"></i> Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cart Offcanvas -->
        <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">Shopping Cart</h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="offcanvas"
                ></button>
            </div>
            <div class="offcanvas-body">
                <div id="cartItems">
                    <p class="text-muted text-center">Your cart is empty</p>
                </div>
                <div class="mt-auto">
                    <hr />
                    <div class="d-flex justify-content-between">
                        <strong>Total:</strong>
                        <strong id="cartTotal">$0.00</strong>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="addToCartToast" class="toast" role="alert">
                <div class="toast-header bg-success text-white">
                    <i class="bi bi-check-circle me-2"></i>
                    <strong class="me-auto">Success</strong>
                    <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="toast"
                    ></button>
                </div>
                <div class="toast-body" id="toastMessage">
                    Item added to cart!
                </div>
            </div>
        </div>

        <script>
            // Products Array
            let products = [
                {
                    id: 1,
                    name: 'Laptop',
                    description: 'High-performance laptop for work and gaming',
                    price: 999.99,
                    category: 'Electronics',
                    stock: 5,
                    image: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400',
                },
                {
                    id: 2,
                    name: 'Smartphone',
                    description: 'Latest model with amazing camera',
                    price: 699.99,
                    category: 'Electronics',
                    stock: 0,
                    image: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400',
                },
                {
                    id: 3,
                    name: 'Headphones',
                    description: 'Noise-cancelling wireless headphones',
                    price: 199.99,
                    category: 'Audio',
                    stock: 15,
                    image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400',
                },
                {
                    id: 4,
                    name: 'Keyboard',
                    description: 'Mechanical gaming keyboard with RGB',
                    price: 89.99,
                    category: 'Accessories',
                    stock: 8,
                    image: 'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400',
                },
                {
                    id: 5,
                    name: 'Mouse',
                    description: 'Ergonomic wireless mouse',
                    price: 49.99,
                    category: 'Accessories',
                    stock: 12,
                    image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400',
                },
            ];

            // Cart Array
            let cart = [];

            // Current product being viewed
            let currentProduct = null;
            let currentQuantity = 1;

            // Render products in grid
            function renderProducts() {
                let productsGrid = document.getElementById('productsGrid');
                let content = '';

                productsGrid.innerHTML = '';

                for (let i = 0; i < products.length; i++) {
                    let product = products[i];
                    let isOutOfStock = product.stock === 0;

                    content =
                        content +
                        `
                    <div class="col-md-4 col-sm-6 mb-4">
                        <div class="card h-100 ${isOutOfStock ? 'opacity-50' : ''}">
                            <img src="${product.image}" class="card-img-top object-fit-cover" style="height: 200px;" alt="${product.name}">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text text-muted small">${product.category}</p>
                                <p class="card-text flex-grow-1">${product.description}</p>
                                <p class="card-text"><strong class="text-primary">$${product.price.toFixed(2)}</strong></p>
                                <p class="card-text small ${isOutOfStock ? 'text-danger' : 'text-success'}">
                                    ${isOutOfStock ? 'Out of Stock' : `In Stock: ${product.stock}`}
                                </p>
                                <button class="btn btn-primary w-100"
                                        data-bs-toggle="modal"
                                        data-bs-target="#productModal"
                                        onclick="showProductDetails(${product.id})"
                                        ${isOutOfStock ? 'disabled' : ''}>
                                    Show Details
                                </button>
                            </div>
                        </div>
                    </div>
                    `;
                }

                productsGrid.innerHTML = content;
            }

            // Show product details in modal
            function showProductDetails(productId) {
                currentProduct = products.find((p) => p.id === productId);
                currentQuantity = 1;

                document.getElementById('modalProductName').innerHTML =
                    currentProduct.name;
                document.getElementById('modalProductImage').src =
                    currentProduct.image;
                document.getElementById('modalProductImage').alt =
                    currentProduct.name;
                document.getElementById('modalProductDescription').innerHTML =
                    currentProduct.description;
                document.getElementById('modalProductPrice').innerHTML =
                    currentProduct.price.toFixed(2);
                document.getElementById('modalProductCategory').innerHTML =
                    currentProduct.category;
                document.getElementById('modalProductStock').innerHTML =
                    currentProduct.stock;
                document.getElementById('quantityInput').value =
                    currentQuantity;
            }

            // Increase quantity
            function increaseQuantity() {
                if (currentProduct && currentQuantity < currentProduct.stock) {
                    currentQuantity++;
                    document.getElementById('quantityInput').value =
                        currentQuantity;
                }
            }

            // Decrease quantity
            function decreaseQuantity() {
                if (currentQuantity > 1) {
                    currentQuantity--;
                    document.getElementById('quantityInput').value =
                        currentQuantity;
                }
            }

            // Add to cart
            function addToCart() {
                if (currentProduct) {
                    // Check if product already in cart
                    let existingItem = cart.find(
                        (item) => item.id === currentProduct.id,
                    );

                    if (existingItem) {
                        existingItem.quantity += currentQuantity;
                    } else {
                        cart.push({
                            id: currentProduct.id,
                            name: currentProduct.name,
                            price: currentProduct.price,
                            quantity: currentQuantity,
                        });
                    }

                    // Show toast
                    showToast(
                        `${currentProduct.name} (x${currentQuantity}) added to cart!`,
                    );

                    // Update cart display
                    updateCartBadge();
                    renderCart();
                }
            }

            // Show toast message
            function showToast(message) {
                document.getElementById('toastMessage').textContent = message;
                let toast = new bootstrap.Toast(
                    document.getElementById('addToCartToast'),
                );
                toast.show();
            }

            // Update cart badge
            function updateCartBadge() {
                let totalItems = cart.reduce(
                    (sum, item) => sum + item.quantity,
                    0,
                );
                document.getElementById('cartBadge').textContent = totalItems;
            }

            // Render cart items
            function renderCart() {
                let cartItems = document.getElementById('cartItems');

                if (cart.length === 0) {
                    cartItems.innerHTML =
                        '<p class="text-muted text-center">Your cart is empty</p>';
                    document.getElementById('cartTotal').textContent = '$0.00';
                    return;
                }

                let cartHTML = '';
                let total = 0;

                for (let i = 0; i < cart.length; i++) {
                    let item = cart[i];
                    let itemTotal = item.price * item.quantity;
                    total += itemTotal;

                    cartHTML += `
                        <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="mb-1">${item.name}</h6>
                                <p class="mb-1 small text-muted">$${item.price.toFixed(2)} x ${item.quantity}</p>
                                <p class="mb-0"><strong>$${itemTotal.toFixed(2)}</strong></p>
                            </div>
                        </div>
                    `;
                }

                cartItems.innerHTML = cartHTML;
                document.getElementById('cartTotal').innerHTML =
                    `$${total.toFixed(2)}`;
            }

            renderProducts();
        </script>
    </body>
</html>
